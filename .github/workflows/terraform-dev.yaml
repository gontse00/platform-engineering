name: Terraform Dev

on:
  workflow_dispatch:
  push:
    branches: [cloud/gcp-dev]
    paths:
      - "survivor-network/infra/cloud/dev/**"
      - "survivor-network/infra/modules/**"

defaults:
  run:
    working-directory: survivor-network/infra/cloud/dev

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="cloud_sql_password=${{ secrets.CLOUD_SQL_PASSWORD }}"

  apply:
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/cloud/gcp-dev' && github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="cloud_sql_password=${{ secrets.CLOUD_SQL_PASSWORD }}"
