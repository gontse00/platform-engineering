name: Build Images

on:
  push:
    branches: [master, rescue-net, cloud/gcp-dev]
    paths:
      - "survivor-network/chatbot-service/**"
      - "survivor-network/admin-service/**"
      - "survivor-network/incident-service/**"
      - "survivor-network/participant-service/**"
      - "survivor-network/agent-service/**"
      - "survivor-network/graph-core/**"
      - "survivor-network/chatbot-ui-service/**"
      - "survivor-network/admin-ui/**"

env:
  GCP_REGION: europe-west2
  REGISTRY: "europe-west2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/survivor-network"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: chatbot-service
            path: survivor-network/chatbot-service
          - name: graph-core
            path: survivor-network/graph-core/backend
          - name: chatbot-ui
            path: survivor-network/chatbot-ui-service
          - name: admin-ui
            path: survivor-network/admin-ui
          - name: agent-service
            path: survivor-network/agent-service
          - name: incident-service
            path: survivor-network/incident-service
          - name: participant-service
            path: survivor-network/participant-service
          - name: admin-service
            path: survivor-network/admin-service
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Artifact Registry auth
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          build_args=()
          if [ "${{ matrix.name }}" = "admin-ui" ]; then
            build_args+=(
              --build-arg VITE_GRAPH_CORE_URL="http://graph.dev.rescuenet.co.za"
              --build-arg VITE_ADMIN_SERVICE_URL="http://admin-api.dev.rescuenet.co.za"
            )
          fi
          docker build \
            "${build_args[@]}" \
            -t ${{ env.REGISTRY }}/${{ matrix.name }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ matrix.name }}:dev \
            ${{ matrix.path }}

      - name: Push image
        run: |
          docker push ${{ env.REGISTRY }}/${{ matrix.name }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ matrix.name }}:dev
