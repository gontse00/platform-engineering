apiVersion: v1
kind: ConfigMap
metadata:
  name: incident-service-config
  namespace: survivor-apps
data:
  SERVICE_NAME: "incident-service"
  DATABASE_URL: "postgresql+psycopg2://survivor:survivor-pw@survivor-db-postgresql.data.svc.cluster.local:5432/survivor"
  GRAPH_CORE_URL: "http://graph-core:8080"
  PARTICIPANT_SERVICE_URL: "http://participant-service:8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-service
  namespace: survivor-apps
  labels:
    app: incident-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-service
  template:
    metadata:
      labels:
        app: incident-service
    spec:
      containers:
        - name: incident-service
          image: incident-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: incident-service-config
                  key: DATABASE_URL
            - name: SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: incident-service-config
                  key: SERVICE_NAME
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: incident-service
  namespace: survivor-apps
spec:
  selector:
    app: incident-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: incident-service-ingress
  namespace: survivor-apps
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: incident-service.127.0.0.1.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: incident-service
                port:
                  number: 8080
