apiVersion: v1
kind: ConfigMap
metadata:
  name: graph-core-config
  namespace: survivor-apps
data:
  APP_NAME: "graph-core"
  APP_ENV: "local"
  DATABASE_URL: "postgresql://survivor:survivor-pw@survivor-db-postgresql.data.svc.cluster.local:5432/survivor"

---
apiVersion: v1
kind: Secret
metadata:
  name: graph-core-secret
  namespace: survivor-apps
type: Opaque
stringData:
  DATABASE_URL: "postgresql://survivor:survivor-pw@survivor-db-postgresql.data.svc.cluster.local:5432/survivor"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-core
  namespace: survivor-apps
  labels:
    app: graph-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graph-core
  template:
    metadata:
      labels:
        app: graph-core
    spec:
      containers:
        - name: graph-core
          image: graph-core:latest   # change this to your actual image:tag
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: graph-core-config
                  key: APP_NAME
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: graph-core-config
                  key: APP_ENV
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: graph-core-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "500m"
              memory: "3Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: graph-core
  namespace: survivor-apps
  labels:
    app: graph-core
spec:
  selector:
    app: graph-core
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: graph-core-ingress
  namespace: survivor-apps
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: graph-core.127.0.0.1.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: graph-core
                port:
                  number: 8080