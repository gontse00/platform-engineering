apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatbot-ui
  namespace: survivor-apps
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: chatbot-ui.127.0.0.1.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chatbot-ui
                port:
                  number: 80
