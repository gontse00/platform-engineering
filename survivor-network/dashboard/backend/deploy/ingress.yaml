apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: survivor-ingress
  namespace: survivor-apps
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: api.127.0.0.1.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mission-control-svc
            port:
              number: 80