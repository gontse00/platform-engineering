apiVersion: batch/v1
kind: Job
metadata:
  name: chatbot-service-init-db
  namespace: survivor-apps
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: init-db
          image: chatbot-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: chatbot-service-config
                  key: APP_NAME
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: chatbot-service-config
                  key: ENVIRONMENT
            - name: GRAPH_CORE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: chatbot-service-config
                  key: GRAPH_CORE_BASE_URL
            - name: ATTACHMENT_STORAGE_PATH
              valueFrom:
                configMapKeyRef:
                  name: chatbot-service-config
                  key: ATTACHMENT_STORAGE_PATH
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: chatbot-service-secret
                  key: DATABASE_URL
          command: ["python", "-m", "app.db.init_db"]
  backoffLimit: 1