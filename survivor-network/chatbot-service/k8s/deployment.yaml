apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-service
  namespace: survivor-apps
  labels:
    app: chatbot-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot-service
  template:
    metadata:
      labels:
        app: chatbot-service
    spec:
      containers:
        - name: chatbot-service
          image: chatbot-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: chatbot-service-config
                  key: APP_NAME
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: chatbot-service-config
                  key: ENVIRONMENT
            - name: GRAPH_CORE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: chatbot-service-config
                  key: GRAPH_CORE_BASE_URL
            - name: ATTACHMENT_STORAGE_PATH
              valueFrom:
                configMapKeyRef:
                  name: chatbot-service-config
                  key: ATTACHMENT_STORAGE_PATH
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: chatbot-service-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"