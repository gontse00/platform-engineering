apiVersion: v1
kind: ConfigMap
metadata:
  name: admin-service-config
  namespace: survivor-apps
data:
  SERVICE_NAME: "admin-service"
  AUTH_MODE: "dev"
  GRAPH_CORE_URL: "http://graph-core:8080"
  INCIDENT_SERVICE_URL: "http://incident-service:8080"
  PARTICIPANT_SERVICE_URL: "http://participant-service:8080"
  ATTACHMENT_SERVICE_URL: "http://attachment-service:8080"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8080"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: survivor-apps
  labels:
    app: admin-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      containers:
        - name: admin-service
          image: admin-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: admin-service-config
                  key: SERVICE_NAME
            - name: AUTH_MODE
              valueFrom:
                configMapKeyRef:
                  name: admin-service-config
                  key: AUTH_MODE
            - name: GRAPH_CORE_URL
              valueFrom:
                configMapKeyRef:
                  name: admin-service-config
                  key: GRAPH_CORE_URL
            - name: INCIDENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: admin-service-config
                  key: INCIDENT_SERVICE_URL
            - name: PARTICIPANT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: admin-service-config
                  key: PARTICIPANT_SERVICE_URL
            - name: ATTACHMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: admin-service-config
                  key: ATTACHMENT_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: admin-service-config
                  key: NOTIFICATION_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
