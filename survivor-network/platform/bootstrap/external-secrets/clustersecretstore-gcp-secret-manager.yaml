apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: survivor-rescue-net-dev
      auth:
        workloadIdentity:
          # TODO: Create or choose a Google service account for External Secrets.
          # TODO: Grant it roles/secretmanager.secretAccessor.
          # TODO: Bind Kubernetes service account external-secrets/external-secrets
          # to that Google service account with Workload Identity before applying
          # this ClusterSecretStore.
          clusterLocation: europe-west2-a
          clusterName: survivor-network-dev
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
