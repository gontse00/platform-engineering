apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: survivor-db-url
  namespace: survivor-apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-secret-manager
  target:
    name: survivor-db-url
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        # TODO: Create GCP Secret Manager secret survivor-db-url with the full
        # SQLAlchemy DATABASE_URL value, for example:
        # postgresql+psycopg2://survivor:password@host:5432/survivor
        key: survivor-db-url
