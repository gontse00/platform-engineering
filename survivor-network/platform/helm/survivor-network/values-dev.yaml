# Cloud dev environment overrides (GCP)
# TODO: CI/CD can override image tags with --set at deploy time:
#   helm upgrade --install ... --set services.chatbotService.image.tag=$SHA
global:
  imageRegistry: "europe-west2-docker.pkg.dev/survivor-rescue-net-dev/survivor-network"
  imagePullPolicy: Always
  domain: "dev.rescuenet.co.za"
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  ingress:
    tls:
      enabled: false
      clusterIssuer: "letsencrypt-staging"
      secretNameSuffix: tls
  cloudSql:
    authProxy:
      enabled: false
      instanceConnectionName: "survivor-rescue-net-dev:europe-west2:survivor-network-dev-db"

initDb:
  enabled: false

services:
  chatbotService:
    replicas: 2
    image:
      tag: "dev"
    env:
      GRAPH_CORE_BASE_URL: "http://graph-core:8080"
      AGENT_SERVICE_BASE_URL: "http://agent-service:8080"
      INCIDENT_SERVICE_BASE_URL: "http://incident-service:8080"
      LLM_ENABLED: "false"
    secretEnv:
      - name: DATABASE_URL
        secretName: survivor-db-url
        secretKey: DATABASE_URL
    ingress:
      enabled: true
      host: null
      subdomain: api
    cloudSqlAuthProxy:
      enabled: true

  adminService:
    image:
      tag: "dev"
    env:
      GRAPH_CORE_URL: "http://graph-core:8080"
      INCIDENT_SERVICE_URL: "http://incident-service:8080"
      PARTICIPANT_SERVICE_URL: "http://participant-service:8080"
      AUTH_MODE: "dev"
    ingress:
      enabled: true
      host: null
      subdomain: admin-api

  incidentService:
    image:
      tag: "dev"
    env:
      ENVIRONMENT: "dev"
    secretEnv:
      - name: DATABASE_URL
        secretName: survivor-db-url
        secretKey: DATABASE_URL
    ingress:
      enabled: true
      host: null
      subdomain: incidents
    cloudSqlAuthProxy:
      enabled: true

  participantService:
    image:
      tag: "dev"
    secretEnv:
      - name: DATABASE_URL
        secretName: survivor-db-url
        secretKey: DATABASE_URL
    ingress:
      enabled: true
      host: null
      subdomain: participants
    cloudSqlAuthProxy:
      enabled: true

  graphCore:
    image:
      tag: "dev"
    env:
      LLM_ENABLED: "false"
    secretEnv:
      - name: DATABASE_URL
        secretName: survivor-db-url
        secretKey: DATABASE_URL
    ingress:
      enabled: true
      host: null
      subdomain: graph
    cloudSqlAuthProxy:
      enabled: true

  agentService:
    image:
      tag: "dev"
    env:
      LLM_ENABLED: "false"
    ingress:
      enabled: false

  chatbotUi:
    image:
      tag: "dev"
    ingress:
      enabled: true
      host: null
      subdomain: chat

  adminUi:
    image:
      tag: "dev"
    ingress:
      enabled: true
      host: null
      subdomain: admin
