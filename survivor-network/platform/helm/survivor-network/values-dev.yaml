# Cloud dev environment overrides (GCP)
# TODO: CI/CD can override image tags with --set at deploy time:
#   helm upgrade --install ... --set services.chatbotService.image.tag=$SHA
global:
  imageRegistry: "europe-west2-docker.pkg.dev/survivor-rescue-net-dev/survivor-network"
  imagePullPolicy: Always
  domain: "survivor-dev.example.com"
  ingress:
    tls:
      enabled: false
      clusterIssuer: ""
      secretNameSuffix: tls

initDb:
  enabled: false

services:
  chatbotService:
    replicas: 2
    image:
      tag: "dev"
    env:
      GRAPH_CORE_BASE_URL: "http://graph-core:8080"
      AGENT_SERVICE_BASE_URL: "http://agent-service:8080"
      INCIDENT_SERVICE_BASE_URL: "http://incident-service:8080"
      LLM_ENABLED: "false"
    secretEnv:
      - name: DATABASE_URL
        secretName: survivor-db-url
        secretKey: DATABASE_URL
    ingress:
      enabled: true
      host: null
      subdomain: chatbot

  adminService:
    image:
      tag: "dev"
    env:
      GRAPH_CORE_URL: "http://graph-core:8080"
      INCIDENT_SERVICE_URL: "http://incident-service:8080"
      PARTICIPANT_SERVICE_URL: "http://participant-service:8080"
      AUTH_MODE: "dev"
    ingress:
      enabled: true
      host: null
      subdomain: admin-api

  incidentService:
    image:
      tag: "dev"
    env:
      ENVIRONMENT: "dev"
    secretEnv:
      - name: DATABASE_URL
        secretName: survivor-db-url
        secretKey: DATABASE_URL
    ingress:
      enabled: true
      host: null
      subdomain: incidents

  participantService:
    image:
      tag: "dev"
    secretEnv:
      - name: DATABASE_URL
        secretName: survivor-db-url
        secretKey: DATABASE_URL
    ingress:
      enabled: true
      host: null
      subdomain: participants

  graphCore:
    image:
      tag: "dev"
    env:
      LLM_ENABLED: "false"
    secretEnv:
      - name: DATABASE_URL
        secretName: survivor-db-url
        secretKey: DATABASE_URL
    ingress:
      enabled: true
      host: null
      subdomain: graph

  agentService:
    image:
      tag: "dev"
    env:
      LLM_ENABLED: "false"
    ingress:
      enabled: false

  chatbotUi:
    image:
      tag: "dev"
    ingress:
      enabled: true
      host: null
      subdomain: chat

  adminUi:
    image:
      tag: "dev"
    ingress:
      enabled: true
      host: null
      subdomain: dashboard
