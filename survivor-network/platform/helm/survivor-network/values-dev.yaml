# Cloud dev environment overrides (GCP)
# TODO: CI/CD can override image tags with --set at deploy time:
#   helm upgrade --install ... --set services.chatbotService.image.tag=$SHA
global:
  imageRegistry: "europe-west2-docker.pkg.dev/survivor-rescue-net-dev/survivor-network"
  imagePullPolicy: Always

services:
  chatbotService:
    replicas: 2
    image:
      tag: "dev"
    env:
      GRAPH_CORE_BASE_URL: "http://graph-core:8080"
      AGENT_SERVICE_BASE_URL: "http://agent-service:8080"
      INCIDENT_SERVICE_BASE_URL: "http://incident-service:8080"
      LLM_ENABLED: "false"
    secretEnv:
      - name: DATABASE_URL
        secretName: survivor-db-url
        secretKey: DATABASE_URL
    ingress:
      enabled: true
      host: chatbot.survivor-dev.example.com

  adminService:
    image:
      tag: "dev"
    env:
      GRAPH_CORE_URL: "http://graph-core:8080"
      INCIDENT_SERVICE_URL: "http://incident-service:8080"
      PARTICIPANT_SERVICE_URL: "http://participant-service:8080"
      AUTH_MODE: "dev"
    ingress:
      enabled: true
      host: admin-api.survivor-dev.example.com

  incidentService:
    image:
      tag: "dev"
    env:
      ENVIRONMENT: "dev"
    secretEnv:
      - name: DATABASE_URL
        secretName: survivor-db-url
        secretKey: DATABASE_URL
    ingress:
      enabled: true
      host: incidents.survivor-dev.example.com

  participantService:
    image:
      tag: "dev"
    secretEnv:
      - name: DATABASE_URL
        secretName: survivor-db-url
        secretKey: DATABASE_URL
    ingress:
      enabled: true
      host: participants.survivor-dev.example.com

  graphCore:
    image:
      tag: "dev"
    env:
      LLM_ENABLED: "false"
    secretEnv:
      - name: DATABASE_URL
        secretName: survivor-db-url
        secretKey: DATABASE_URL
    ingress:
      enabled: true
      host: graph.survivor-dev.example.com

  agentService:
    image:
      tag: "dev"
    env:
      LLM_ENABLED: "false"
    ingress:
      enabled: false

  chatbotUi:
    image:
      tag: "dev"
    ingress:
      enabled: true
      host: chat.survivor-dev.example.com

  adminUi:
    image:
      tag: "dev"
    ingress:
      enabled: true
      host: dashboard.survivor-dev.example.com
