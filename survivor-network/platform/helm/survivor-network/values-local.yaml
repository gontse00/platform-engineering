# Local Kind cluster overrides
global:
  imageRegistry: ""
  imagePullPolicy: IfNotPresent

services:
  chatbotService:
    image:
      tag: latest
    env:
      LLM_ENABLED: "false"
  incidentService:
    env:
      DATABASE_URL: "postgresql+psycopg2://survivor:survivor-pw@survivor-db-postgresql.data.svc.cluster.local:5432/survivor"
      ENVIRONMENT: "local"
  participantService:
    env:
      DATABASE_URL: "postgresql+psycopg2://survivor:survivor-pw@survivor-db-postgresql.data.svc.cluster.local:5432/survivor"
