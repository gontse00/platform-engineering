{{- range $key, $svc := .Values.services }}
{{- if and $svc.enabled $svc.ingress $svc.ingress.enabled }}
{{- $host := $svc.ingress.host }}
{{- if and (not $host) $.Values.global.domain }}
{{- $host = printf "%s.%s" ($svc.ingress.subdomain | default $svc.name) $.Values.global.domain }}
{{- end }}
{{- $tlsHosts := list $host }}
{{- if and $svc.ingress.tls $svc.ingress.tls.hosts }}
{{- $tlsHosts = $svc.ingress.tls.hosts }}
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $svc.name }}-ingress
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $svc.name }}
    {{- include "survivor-network.labels" $ | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    {{- if and $.Values.global.ingress.tls.enabled $.Values.global.ingress.tls.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ $.Values.global.ingress.tls.clusterIssuer | quote }}
    {{- end }}
spec:
  ingressClassName: nginx
  {{- if $.Values.global.ingress.tls.enabled }}
  tls:
    - hosts:
        {{- range $tlsHosts }}
        - {{ . }}
        {{- end }}
      secretName: {{ $svc.name }}-{{ $.Values.global.ingress.tls.secretNameSuffix | default "tls" }}
  {{- end }}
  rules:
    - host: {{ $host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $svc.name }}
                port:
                  number: {{ $svc.port }}
{{- end }}
{{- end }}
