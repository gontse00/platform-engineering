{{- range $key, $svc := .Values.services }}
{{- if $svc.enabled }}
{{- $cloudSqlProxyEnabled := false }}
{{- if $svc.cloudSqlAuthProxy }}
{{- $cloudSqlProxyEnabled = $svc.cloudSqlAuthProxy.enabled | default false }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $svc.name }}
    {{- include "survivor-network.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  {{- $strategy := $svc.deploymentStrategy | default $.Values.global.deploymentStrategy }}
  {{- if $strategy }}
  strategy:
    type: {{ $strategy.type | default "RollingUpdate" }}
    {{- if eq ($strategy.type | default "RollingUpdate") "RollingUpdate" }}
    {{- $rollingUpdate := $strategy.rollingUpdate | default dict }}
    rollingUpdate:
      maxSurge: {{ if hasKey $rollingUpdate "maxSurge" }}{{ index $rollingUpdate "maxSurge" }}{{ else }}25%{{ end }}
      maxUnavailable: {{ if hasKey $rollingUpdate "maxUnavailable" }}{{ index $rollingUpdate "maxUnavailable" }}{{ else }}25%{{ end }}
    {{- end }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ $svc.name }}
  template:
    metadata:
      labels:
        app: {{ $svc.name }}
    spec:
      serviceAccountName: survivor-network
      # TODO: Add explicit SIGTERM handling in FastAPI services so in-flight
      # requests and DB sessions drain cleanly during scale-down.
      terminationGracePeriodSeconds: {{ $svc.terminationGracePeriodSeconds | default $.Values.global.terminationGracePeriodSeconds | default 30 }}
      containers:
        - name: {{ $svc.name }}
          image: {{ if $.Values.global.imageRegistry }}{{ $.Values.global.imageRegistry }}/{{ end }}{{ $svc.image.repository }}:{{ $svc.image.tag }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ $svc.name }}-config
          {{- if $svc.secretEnv }}
          env:
            {{- range $svc.secretEnv }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
            {{- end }}
          {{- end }}
          {{- if $svc.probes }}
          {{- if $svc.probes.readiness }}
          readinessProbe:
            httpGet:
              path: {{ $svc.probes.readiness.path }}
              port: {{ $svc.port }}
            initialDelaySeconds: {{ $svc.probes.readiness.initialDelaySeconds | default 5 }}
            periodSeconds: {{ $svc.probes.readiness.periodSeconds | default 10 }}
            timeoutSeconds: 5
            failureThreshold: 6
          {{- end }}
          {{- if $svc.probes.liveness }}
          livenessProbe:
            httpGet:
              path: {{ $svc.probes.liveness.path }}
              port: {{ $svc.port }}
            initialDelaySeconds: {{ $svc.probes.liveness.initialDelaySeconds | default 15 }}
            periodSeconds: {{ $svc.probes.liveness.periodSeconds | default 30 }}
            timeoutSeconds: 10
            failureThreshold: 5
          {{- end }}
          {{- end }}
          {{- if $svc.resources }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          {{- end }}
        {{- if and $.Values.global.cloudSql.authProxy.enabled $cloudSqlProxyEnabled }}
        - name: cloud-sql-auth-proxy
          image: {{ $.Values.global.cloudSql.authProxy.image }}
          imagePullPolicy: IfNotPresent
          args:
            - "--structured-logs"
            - "--port={{ $.Values.global.cloudSql.authProxy.port | default 5432 }}"
            - {{ required "global.cloudSql.authProxy.instanceConnectionName is required when Cloud SQL Auth Proxy is enabled" $.Values.global.cloudSql.authProxy.instanceConnectionName | quote }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          {{- if $.Values.global.cloudSql.authProxy.resources }}
          resources:
            {{- toYaml $.Values.global.cloudSql.authProxy.resources | nindent 12 }}
          {{- end }}
        {{- end }}
{{- end }}
{{- end }}
