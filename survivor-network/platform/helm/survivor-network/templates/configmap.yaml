{{- range $key, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $svc.name }}-config
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $svc.name }}
    {{- include "survivor-network.labels" $ | nindent 4 }}
data:
  SERVICE_NAME: {{ $svc.name | quote }}
  {{- $secretNames := list }}
  {{- range $svc.secretEnv }}
  {{- $secretNames = append $secretNames .name }}
  {{- end }}
  {{- range $envKey, $envVal := $svc.env }}
  {{- if not (has $envKey $secretNames) }}
  {{ $envKey }}: {{ $envVal | quote }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
