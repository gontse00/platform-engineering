{{- if .Values.initDb.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: chatbot-db-init
  namespace: {{ .Values.global.namespace }}
  labels:
    app: chatbot-db-init
    {{- include "survivor-network.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: chatbot-db-init
    spec:
      restartPolicy: Never
      containers:
        - name: init-db
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: {{ .Values.initDb.host | quote }}
            - name: PGPORT
              value: {{ .Values.initDb.port | quote }}
            - name: PGDATABASE
              value: {{ .Values.initDb.database | quote }}
            - name: PGUSER
              value: {{ .Values.initDb.user | quote }}
            - name: PGPASSWORD
              value: {{ .Values.initDb.password | quote }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Creating chatbot-service tables..."
              psql -v ON_ERROR_STOP=0 <<'EOF'
              CREATE TABLE IF NOT EXISTS chat_sessions (
                  id UUID PRIMARY KEY,
                  status VARCHAR(50) DEFAULT 'active',
                  stage VARCHAR(100) DEFAULT 'initial',
                  provisional_case_id VARCHAR(100),
                  escalated BOOLEAN DEFAULT FALSE,
                  latest_urgency VARCHAR(50),
                  latest_queue VARCHAR(100),
                  state_json JSONB DEFAULT '{}',
                  submitted_at TIMESTAMPTZ,
                  closed_at TIMESTAMPTZ,
                  last_user_message_at TIMESTAMPTZ,
                  last_assessed_at TIMESTAMPTZ,
                  created_at TIMESTAMPTZ DEFAULT NOW(),
                  updated_at TIMESTAMPTZ DEFAULT NOW()
              );

              CREATE TABLE IF NOT EXISTS chat_messages (
                  id UUID PRIMARY KEY,
                  session_id UUID REFERENCES chat_sessions(id),
                  role VARCHAR(20),
                  content TEXT,
                  client_message_id VARCHAR(100),
                  extracted_json JSONB DEFAULT '{}',
                  agent_reasoning_json JSONB,
                  safety_flags_json JSONB,
                  created_at TIMESTAMPTZ DEFAULT NOW()
              );

              CREATE TABLE IF NOT EXISTS chat_attachments (
                  id UUID PRIMARY KEY,
                  session_id UUID REFERENCES chat_sessions(id),
                  attachment_type VARCHAR(50),
                  storage_path TEXT,
                  original_filename VARCHAR(255),
                  metadata_json JSONB DEFAULT '{}',
                  created_at TIMESTAMPTZ DEFAULT NOW()
              );

              CREATE INDEX IF NOT EXISTS ix_chat_messages_session_id ON chat_messages(session_id);
              CREATE INDEX IF NOT EXISTS ix_chat_messages_client_message_id ON chat_messages(client_message_id);
              CREATE INDEX IF NOT EXISTS ix_chat_attachments_session_id ON chat_attachments(session_id);

              -- incident-service tables (also needed on fresh DB)
              ALTER TABLE cases ADD COLUMN IF NOT EXISTS source_session_id VARCHAR(100);
              CREATE UNIQUE INDEX IF NOT EXISTS ix_cases_source_session_id ON cases(source_session_id) WHERE source_session_id IS NOT NULL;
              EOF
              echo "Done."
{{- end }}
